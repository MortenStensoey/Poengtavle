<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KSK Håndballfest – Kampprogram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* KSK fargeprofil — rød, hvit, mørk */
    --ksk-red:        #4a6fa5;   /* KSK primærrød */
    --ksk-red-dark:   #354f78;   /* hover / mørkere rød */
    --ksk-red-light:  #7a9dc7;   /* lys rød, accents */
    --ksk-red-faint:  rgba(74,111,165,0.10);

    --bg:             #f5f5f5;   /* lys grå bakgrunn — som på ksk-siden */
    --bg-white:       #ffffff;
    --dark:           #1a1a1a;
    --dark2:          #2c2c2c;
    --mid:            #555555;
    --muted:          #999999;
    --border:         #e0e0e0;
    --border-dark:    #cccccc;

    --font-display: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif;
    --font-body:    'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    min-height: 100vh;
    color: var(--dark);
    overflow-x: hidden;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--dark);
    height: 4px;
  }
  .topbar-stripe {
    height: 100%;
    background: var(--ksk-red);
    width: 40%;
  }

  /* ── HERO ── */
  header {
    position: relative;
    height: 320px;
    overflow: hidden;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: end;
    -webkit-align-items: flex-end;
    align-items: flex-end;
    background: var(--dark);
  }
  .hero-img {
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 25%;
    -webkit-filter: grayscale(30%) brightness(0.5) contrast(1.1);
    filter: grayscale(30%) brightness(0.5) contrast(1.1);
  }
  .hero-overlay {
    position: absolute;
    top: 0; right: 0; bottom: 0; left: 0;
    background: linear-gradient(
      to bottom,
      rgba(26,26,26,0.1) 0%,
      rgba(26,26,26,0.5) 50%,
      rgba(26,26,26,0.95) 100%
    );
  }
  .hero-content {
    position: relative;
    z-index: 2;
    padding: 0 28px 32px;
    width: 100%;
  }
  /* Red accent bar above title */
  .hero-accent {
    width: 48px;
    height: 4px;
    background: var(--ksk-red);
    margin-bottom: 12px;
    border-radius: 2px;
  }
  .hero-kicker {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 6px;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(48px, 11vw, 72px);
    color: #ffffff;
    letter-spacing: 2px;
    line-height: 0.92;
  }
  .hero-title .sub {
    display: block;
    color: var(--ksk-red-light);
  }

  /* ── NAV STRIP ── */
  .nav-strip {
    background: var(--ksk-red);
    padding: 0 28px;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    height: 40px;
  }
  .nav-strip span {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
  }
  .nav-strip a {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #fff;
    text-decoration: none;
    margin-left: auto;
    opacity: 0.8;
  }

  /* ── MAIN ── */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }

  /* ── SECTION HEADER ── */
  .section-heading {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    margin-bottom: 16px;
  }
  .section-heading .bar {
    width: 4px;
    height: 22px;
    background: var(--ksk-red);
    border-radius: 2px;
    margin-right: 10px;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
  }
  .section-heading h2 {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 1.5px;
    color: var(--dark);
    text-transform: uppercase;
  }

  /* ── SELECTOR CARD ── */
  .selector-card {
    background: var(--bg-white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 22px;
    margin-bottom: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .team-grid {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    margin: -4px;
  }
  .team-btn {
    -webkit-appearance: none;
    appearance: none;
    margin: 4px;
    padding: 9px 12px;
    min-height: 44px;
    border: 1.5px solid var(--border-dark);
    border-radius: 5px;
    background: var(--bg);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    color: var(--mid);
    cursor: pointer;
    text-align: center;
    -webkit-transition: all .12s;
    transition: all .12s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    -webkit-tap-highlight-color: transparent;
    width: calc(50% - 8px);
  }
  @media (min-width:360px) { .team-btn { width: calc(33.33% - 8px); } }
  @media (min-width:520px) { .team-btn { width: calc(25% - 8px); } }
  @media (min-width:700px) { .team-btn { width: calc(20% - 8px); } }

  .team-btn:hover {
    border-color: var(--ksk-red);
    color: var(--ksk-red);
    background: var(--bg-white);
  }
  .team-btn.active {
    border-color: var(--ksk-red);
    background: var(--ksk-red);
    color: #ffffff;
    font-weight: 600;
  }

  /* ── RESULTS ── */
  #results { -webkit-animation: fadeIn .2s ease; animation: fadeIn .2s ease; }
  @-webkit-keyframes fadeIn { from { opacity:0; -webkit-transform:translateY(5px); transform:translateY(5px); } to { opacity:1; -webkit-transform:translateY(0); transform:translateY(0); } }
  @keyframes fadeIn        { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

  .results-card {
    background: var(--bg-white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .results-header {
    background: var(--dark);
    padding: 18px 22px;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
  }
  .team-badge {
    width: 42px; height: 42px;
    border-radius: 6px;
    background: var(--ksk-red);
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    -webkit-box-pack: center;
    -webkit-justify-content: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 16px;
    color: #fff;
    letter-spacing: 1px;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    margin-right: 14px;
  }
  .team-title {
    font-family: var(--font-display);
    font-size: 26px;
    color: #ffffff;
    letter-spacing: 1.5px;
    line-height: 1;
    text-transform: uppercase;
  }
  .team-subtitle { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }

  .summary-bar {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    padding: 12px 22px;
    background: #f9f9f9;
    border-bottom: 1px solid var(--border);
    margin: -4px;
  }
  .stat-pill {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    margin: 4px;
    background: var(--bg-white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 13px;
    font-size: 12px;
    color: var(--mid);
  }
  .stat-pill .num { color: var(--ksk-red); font-size: 15px; font-weight: 700; margin-right: 5px; }

  .rounds-body { padding: 16px 22px 20px; }

  /* ── ROUND BLOCK ── */
  .round-block { margin-bottom: 16px; }
  .round-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    padding-left: 2px;
  }

  /* ── MATCH CARD ── */
  .match-card {
    background: var(--bg-white);
    border: 1px solid var(--border);
    border-radius: 6px;
    border-left: 4px solid var(--border-dark);
    overflow: hidden;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: stretch;
    -webkit-align-items: stretch;
    align-items: stretch;
    margin-bottom: 7px;
    -webkit-tap-highlight-color: transparent;
    -webkit-transition: border-color .12s, box-shadow .12s;
    transition: border-color .12s, box-shadow .12s;
  }
  .match-card:hover {
    border-left-color: var(--ksk-red);
    box-shadow: 0 2px 10px rgba(74,111,165,0.15);
  }
  .match-card.bane1 { border-left-color: var(--ksk-red); }
  .match-card.bane2 { border-left-color: var(--dark2); }

  .match-time-col {
    background: #f9f9f9;
    border-right: 1px solid var(--border);
    width: 64px;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    -webkit-box-pack: center;
    -webkit-justify-content: center;
    justify-content: center;
    padding: 12px 4px;
  }
  .match-time-col .time {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--dark);
    letter-spacing: 1px;
    line-height: 1;
  }
  .match-time-col .runde-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--border-dark);
    margin-top: 5px;
  }

  .match-body {
    -webkit-box-flex: 1;
    -webkit-flex: 1;
    flex: 1;
    padding: 11px 14px;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-box-pack: center;
    -webkit-justify-content: center;
    justify-content: center;
    min-width: 0;
  }
  .match-teams {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: baseline;
    -webkit-align-items: baseline;
    align-items: baseline;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    margin-bottom: 5px;
  }
  .team-name-hl {
    font-size: 14px;
    font-weight: 700;
    color: var(--dark);
    margin-right: 7px;
    white-space: nowrap;
  }
  .team-name-op {
    font-size: 13px;
    font-weight: 400;
    color: var(--mid);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 200px;
  }
  .vs {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-right: 7px;
  }
  .match-meta {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
  }
  .bane-tag {
    display: -webkit-inline-box;
    display: -webkit-inline-flex;
    display: inline-flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    padding: 2px 8px;
    border-radius: 3px;
    margin-right: 8px;
  }
  .bane-tag.b1 {
    background: rgba(74,111,165,0.08);
    color: var(--ksk-red);
    border: 1px solid rgba(74,111,165,0.22);
  }
  .bane-tag.b2 {
    background: #f0f0f0;
    color: var(--mid);
    border: 1px solid var(--border);
  }
  .role-tag {
    font-size: 11px;
    color: var(--muted);
  }

  /* ── FOOTER STRIP ── */
  .footer-strip {
    background: var(--dark);
    padding: 20px 28px;
    text-align: center;
  }
  .footer-strip p {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
  }
  .footer-strip a {
    color: var(--ksk-red-light);
    text-decoration: none;
  }

  @media (max-width:480px) {
    header { height: 260px; }
    .hero-title { font-size: 44px; }
    .match-time-col { width: 56px; }
    .match-time-col .time { font-size: 17px; }
    .team-name-op { max-width: 120px; }
    .rounds-body { padding: 12px 14px 16px; }
    .results-header { padding: 14px 16px; }
    .summary-bar { padding: 10px 16px; }
  }
</style>
</head>

var grid = document.getElementById('teamGrid');
var activeTeam = null;

allTeams.forEach(function(team) {
  var btn = document.createElement('button');
  btn.className = 'team-btn';
  btn.textContent = team;
  btn.title = team;
  btn.addEventListener('click', function() { selectTeam(team, btn); });
  grid.appendChild(btn);
});

function selectTeam(team, btn) {
  document.querySelectorAll('.team-btn').forEach(function(b) { b.classList.remove('active'); });
  if (activeTeam === team) {
    activeTeam = null;
    document.getElementById('results').innerHTML = '';
    return;
  }
  btn.classList.add('active');
  activeTeam = team;
  renderResults(team);
}

function renderResults(team) {
  var tm = matches.filter(function(m) { return m.hjemme===team || m.borte===team; });
  var el = document.getElementById('results');
  if (!tm.length) {
    el.innerHTML = '<p style="text-align:center;padding:32px;color:#aaa;font-size:13px;">Ingen kamper funnet.</p>';
    return;
  }
  var byRound = {};
  tm.forEach(function(m) { if(!byRound[m.runde]) byRound[m.runde]=[]; byRound[m.runde].push(m); });
  var abbr = team.replace(/[a-z\s]/g,'').substring(0,2) || team.substring(0,2).toUpperCase();

  var html = '<div class="results-card">';
  html += '<div class="results-header">';
  html += '<div class="team-badge">'+abbr+'</div>';
  html += '<div><div class="team-title">'+esc(team)+'</div><div class="team-subtitle">Ditt kampprogram</div></div>';
  html += '</div>';
  html += '<div class="summary-bar">';
  html += '<div class="stat-pill"><span class="num">'+tm.length+'</span>kamper</div>';
  html += '<div class="stat-pill"><span class="num">'+Object.keys(byRound).length+'</span>runder</div>';
  html += '</div>';
  html += '<div class="rounds-body">';

  Object.keys(byRound).sort(function(a,b){return a-b;}).forEach(function(r) {
    html += '<div class="round-block"><div class="round-label">Runde '+r+'</div>';
    byRound[r].forEach(function(m) {
      var isH = m.hjemme===team;
      var opp = isH ? m.borte : m.hjemme;
      var role = isH ? 'Hjemme' : 'Borte';
      var bc = m.bane==='Bane 1' ? 'b1' : 'b2';
      html += '<div class="match-card '+bc+'">';
      html += '<div class="match-time-col"><div class="time">'+m.tid+'</div><div class="runde-dot"></div></div>';
      html += '<div class="match-body">';
      html += '<div class="match-teams"><span class="team-name-hl">'+esc(team)+'</span><span class="vs">VS</span><span class="team-name-op">'+esc(opp)+'</span></div>';
      html += '<div class="match-meta"><span class="bane-tag '+bc+'">'+m.bane+'</span><span class="role-tag">'+role+'</span></div>';
      html += '</div></div>';
    });
    html += '</div>';
  });

  html += '</div></div>';
  el.innerHTML = html;

  var target = el;
  var targetY = 0;
  while (target) { targetY += target.offsetTop; target = target.offsetParent; }
  targetY -= 20;
  try { window.scrollTo({top: targetY, behavior: 'smooth'}); }
  catch(e) { window.scrollTo(0, targetY); }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>

</html>

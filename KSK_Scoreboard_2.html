<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:       #4a6fa5;
    --accent-dark:  #354f78;
    --accent-light: #7a9dc7;
    --bg:           #f5f5f5;
    --bg-white:     #ffffff;
    --dark:         #1a1a1a;
    --mid:          #555555;
    --muted:        #999999;
    --border:       #e0e0e0;
    --border-dark:  #cccccc;
    --font-d: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif;
    --font-b: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--dark);
    font-family: var(--font-b);
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }

  .app {
    display: -webkit-flex; display: flex;
    -webkit-flex-direction: column; flex-direction: column;
    height: 100%; height: 100dvh;
    width: 100%;
  }

  /* ─────────────────────────────────────────
     TOPBAR
  ───────────────────────────────────────── */
  .topbar { height: 4px; background: var(--dark); -webkit-flex-shrink:0; flex-shrink:0; }
  .topbar-stripe { height:100%; width:40%; background:var(--accent); }

  /* ─────────────────────────────────────────
     HEADER — portrait
  ───────────────────────────────────────── */
  .header {
    -webkit-flex-shrink:0; flex-shrink:0;
    background: var(--dark);
    padding: 14px 22px;
    display: -webkit-flex; display: flex;
    -webkit-align-items: center; align-items: center;
    -webkit-justify-content: space-between; justify-content: space-between;
  }
  .header-left { display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; gap:5px; }
  .header-title { font-family:var(--font-d); font-size:26px; letter-spacing:2.5px; color:#fff; line-height:1; }
  .header-accent { width:32px; height:3px; background:var(--accent); border-radius:2px; }

  .end-btn {
    -webkit-appearance:none; appearance:none;
    padding:0 18px; height:42px; border-radius:6px;
    font-family:var(--font-b); font-size:12px; font-weight:700;
    letter-spacing:1.5px; text-transform:uppercase;
    border:1.5px solid rgba(74,111,165,0.4);
    background:rgba(74,111,165,0.15); color:var(--accent-light);
    cursor:pointer;
    -webkit-transition:all .12s; transition:all .12s;
  }
  .end-btn:active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* ─────────────────────────────────────────
     SCORE AREA — portrait (side by side)
  ───────────────────────────────────────── */
  .score-area {
    -webkit-flex:1; flex:1;
    display:-webkit-flex; display:flex;
    min-height:0;
    background:var(--bg-white);
    border-bottom:1px solid var(--border);
  }

  .team-col {
    -webkit-flex:1; flex:1;
    display:-webkit-flex; display:flex;
    -webkit-flex-direction:column; flex-direction:column;
    -webkit-align-items:center; align-items:center;
    -webkit-justify-content:center; justify-content:center;
    padding:16px 10px;
    position:relative;
  }
  .team-col + .team-col { border-left:1px solid var(--border); }

  .role-tag {
    font-size:9px; font-weight:700;
    letter-spacing:3px; text-transform:uppercase;
    color:var(--muted);
    border:1px solid var(--border); border-radius:20px;
    padding:3px 12px; margin-bottom:10px;
  }

  .team-name {
    font-family:var(--font-d);
    font-size:clamp(16px, 4.5vw, 24px);
    letter-spacing:1.5px; text-transform:uppercase;
    color:var(--dark); text-align:center;
    background:none; border:none;
    border-bottom:2px solid transparent;
    outline:none; width:90%; padding:2px 4px 4px;
    margin-bottom:12px;
    -webkit-appearance:none; cursor:text;
    -webkit-transition:border-color .15s; transition:border-color .15s;
  }
  .team-name::placeholder { color:var(--border-dark); }
  .team-name:focus { border-bottom-color:var(--accent); }

  .score {
    font-family:var(--font-d);
    font-size:clamp(80px, 22vw, 148px);
    line-height:0.88; letter-spacing:-2px;
    color:var(--dark);
    -webkit-transition:color .08s, -webkit-transform .07s; transition:color .08s, transform .07s;
  }
  .score.pop { color:var(--accent); -webkit-transform:scale(1.1); transform:scale(1.1); }

  .btns {
    display:-webkit-flex; display:flex;
    gap:12px; margin-top:16px;
    -webkit-justify-content:center; justify-content:center;
  }

  /* Portrait buttons */
  .btn {
    -webkit-appearance:none; appearance:none;
    width:72px; height:72px; border-radius:14px;
    font-family:var(--font-d); font-size:36px;
    display:-webkit-flex; display:flex;
    -webkit-align-items:center; align-items:center;
    -webkit-justify-content:center; justify-content:center;
    cursor:pointer;
    -webkit-transition:all .1s; transition:all .1s;
    line-height:1; padding-bottom:4px;
    border:2px solid var(--border);
    background:var(--bg); color:var(--mid);
  }
  .btn.plus {
    border-color:var(--accent); background:var(--accent); color:#fff;
    box-shadow:0 4px 14px rgba(74,111,165,0.28);
  }
  .btn.plus:active  { background:var(--accent-dark); border-color:var(--accent-dark); box-shadow:none; -webkit-transform:scale(0.92); transform:scale(0.92); }
  .btn.minus:active { background:var(--border-dark); color:var(--dark); -webkit-transform:scale(0.92); transform:scale(0.92); }
  .btn:disabled { opacity:0.18; pointer-events:none; }

  /* ─────────────────────────────────────────
     BOTTOM
  ───────────────────────────────────────── */
  .bottom {
    -webkit-flex-shrink:0; flex-shrink:0;
    background:var(--bg); padding:12px 20px;
    border-top:1px solid var(--border);
  }
  .reset-btn {
    -webkit-appearance:none; appearance:none;
    width:100%; min-height:50px; border-radius:8px;
    font-family:var(--font-b); font-size:13px; font-weight:700;
    letter-spacing:1.5px; text-transform:uppercase;
    cursor:pointer;
    -webkit-transition:all .12s; transition:all .12s;
    border:1.5px solid var(--border-dark);
    background:var(--bg-white); color:var(--mid);
  }
  .reset-btn:active { -webkit-transform:scale(0.98); transform:scale(0.98); }
  .reset-btn.armed  { border-color:#c0564a; color:#c0564a; background:rgba(192,86,74,0.06); }

  /* ─────────────────────────────────────────
     LANDSCAPE — reflow
  ───────────────────────────────────────── */
  @media (orientation: landscape) {

    /* Slimmer header */
    .header { padding: 8px 20px; }
    .header-title { font-size: 20px; }
    .header-accent { display: none; }
    .end-btn { height: 36px; font-size: 11px; padding: 0 14px; }

    /* Score area: teams stay side-by-side but use full height */
    .score-area { -webkit-flex-direction:row; flex-direction:row; }

    .team-col { padding: 8px 8px; -webkit-justify-content:center; justify-content:center; }

    /* Hide role tag to save space */
    .role-tag { display: none; }

    /* Name smaller */
    .team-name { font-size: clamp(14px, 3vw, 20px); margin-bottom: 6px; }

    /* Score: smaller in landscape */
    .score { font-size: clamp(56px, 16vw, 100px); }

    /* Buttons: wider, less tall — use horizontal space better */
    .btns { gap: 10px; margin-top: 10px; }
    .btn  { width: 64px; height: 60px; font-size: 32px; border-radius: 12px; }

    /* Compact bottom */
    .bottom { padding: 8px 20px; }
    .reset-btn { min-height: 40px; font-size: 11px; letter-spacing: 1px; }
  }

  /* Landscape on tablet: can afford more */
  @media (orientation: landscape) and (min-width: 700px) {
    .score { font-size: clamp(80px, 18vw, 120px); }
    .btn  { width: 80px; height: 72px; font-size: 38px; }
    .btns { gap: 14px; }
  }

  /* Portrait on tablet */
  @media (orientation: portrait) and (min-width: 480px) {
    .btn { width: 88px; height: 88px; font-size: 44px; border-radius: 18px; }
  }

  /* ─────────────────────────────────────────
     WINNER OVERLAY
  ───────────────────────────────────────── */
  .overlay {
    display:none; position:fixed; top:0; right:0; bottom:0; left:0;
    background:rgba(26,26,26,0.92); z-index:100;
    -webkit-flex-direction:column; flex-direction:column;
    -webkit-align-items:center; align-items:center;
    -webkit-justify-content:center; justify-content:center;
    gap:10px; cursor:pointer;
  }
  .overlay.show { display:-webkit-flex; display:flex; -webkit-animation:fadein .2s; animation:fadein .2s; }
  @-webkit-keyframes fadein { from{opacity:0} to{opacity:1} }
  @keyframes fadein         { from{opacity:0} to{opacity:1} }

  .ov-winner {
    font-family:var(--font-d);
    font-size:clamp(40px, 12vw, 70px);
    letter-spacing:3px; text-align:center;
    color:#fff; line-height:1.05; padding:0 24px;
  }
  .ov-score {
    font-family:var(--font-d);
    font-size:clamp(52px, 14vw, 72px);
    letter-spacing:8px; color:var(--accent);
  }
  .ov-hint { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-top:8px; }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .bottom { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
  }
  /* Landscape safe area (notch on left/right) */
  @supports (padding-left: env(safe-area-inset-left)) {
    @media (orientation: landscape) {
      .app { padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
    }
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar"><div class="topbar-stripe"></div></div>

  <div class="header">
    <div class="header-left">
      <div class="header-title">Scoreboard</div>
      <div class="header-accent"></div>
    </div>
    <button class="end-btn" onclick="showResult()">Slutt !</button>
  </div>

  <div class="score-area">
    <div class="team-col">
      <div class="role-tag">Hjemme</div>
      <input class="team-name" id="nameH" type="text" placeholder="Hjemmelag" maxlength="16">
      <div class="score" id="scoreH">0</div>
      <div class="btns">
        <button class="btn minus" id="minH" onclick="add('H',-1)" disabled>−</button>
        <button class="btn plus"  onclick="add('H',+1)">+</button>
      </div>
    </div>
    <div class="team-col">
      <div class="role-tag">Borte</div>
      <input class="team-name" id="nameB" type="text" placeholder="Bortelag" maxlength="16">
      <div class="score" id="scoreB">0</div>
      <div class="btns">
        <button class="btn minus" id="minB" onclick="add('B',-1)" disabled>−</button>
        <button class="btn plus"  onclick="add('B',+1)">+</button>
      </div>
    </div>
  </div>

  <div class="bottom">
    <button class="reset-btn" id="resetBtn" onclick="handleReset()">&#8635; &nbsp; Nullstill poeng</button>
  </div>

</div>

<div class="overlay" id="overlay" onclick="closeOverlay()">
  <div class="ov-winner" id="ovWinner"></div>
  <div class="ov-score"  id="ovScore"></div>
  <div class="ov-hint">Trykk for å lukke</div>
</div>

<script>
var scores = { H: 0, B: 0 };
var resetTimer = null;

function add(side, delta) {
  scores[side] = Math.max(0, scores[side] + delta);
  var el = document.getElementById('score' + side);
  el.textContent = scores[side];
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(function() { el.classList.remove('pop'); }, 150);
  document.getElementById('min' + side).disabled = (scores[side] === 0);
}

function handleReset() {
  var btn = document.getElementById('resetBtn');
  if (btn.classList.contains('armed')) {
    scores.H = 0; scores.B = 0;
    document.getElementById('scoreH').textContent = '0';
    document.getElementById('scoreB').textContent = '0';
    document.getElementById('minH').disabled = true;
    document.getElementById('minB').disabled = true;
    btn.innerHTML = '&#8635; &nbsp; Nullstill poeng';
    btn.classList.remove('armed');
    clearTimeout(resetTimer);
  } else {
    btn.textContent = 'Bekreft nullstilling?';
    btn.classList.add('armed');
    resetTimer = setTimeout(function() {
      btn.innerHTML = '&#8635; &nbsp; Nullstill poeng';
      btn.classList.remove('armed');
    }, 3000);
  }
}

function showResult() {
  var h = scores.H, b = scores.B;
  var nH = document.getElementById('nameH').value.trim() || 'Hjemme';
  var nB = document.getElementById('nameB').value.trim() || 'Borte';
  var winner;
  if      (h > b) winner = nH + '<br>vinner!';
  else if (b > h) winner = nB + '<br>vinner!';
  else            winner = 'Uavgjort!';
  document.getElementById('ovWinner').innerHTML = winner;
  document.getElementById('ovScore').textContent = h + ' \u2013 ' + b;
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
}
</script>
</body>
</html>
